name: Build dashboard

# Tự chạy mỗi khi có commit thay đổi trong thư mục data/, template.html hoặc build.py
# (đẩy file Excel mới vào data/ qua giao diện web GitHub là đủ để trigger)
on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'template.html'
      - 'build.py'
  workflow_dispatch: {}   # cho phép bấm "Run workflow" thủ công trong tab Actions nếu cần

permissions:
  contents: write   # bắt buộc để Action commit lại index.html vào repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài thư viện cần thiết
        run: pip install openpyxl

      - name: Chạy build.py
        run: python3 build.py

      - name: Commit lại index.html nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Tự động build lại dashboard [skip ci]"
          git push
